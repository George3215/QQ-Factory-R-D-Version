<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QQ Factory R&D Control</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">QF</div>
          <div>
            <div class="brand-name">QQ Factory R&D</div>
            <div class="brand-subtitle">Mac unified control</div>
          </div>
        </div>
        <nav class="nav-list" id="navList"></nav>
        <div class="sidebar-footer">
          <span class="health-pill" id="healthPill">offline</span>
          <span class="health-pill" id="workerCount">0 workers</span>
        </div>
      </aside>

      <main class="main-area">
        <header class="topbar">
          <div>
            <div class="page-kicker" id="viewKicker">CONTROL</div>
            <h1 id="viewTitle">Overview</h1>
          </div>
          <div class="topbar-actions">
            <input id="adminToken" type="password" placeholder="admin token" />
            <button id="saveToken">Save</button>
            <button id="refreshBtn">Refresh</button>
          </div>
        </header>
        <section class="view-host" id="viewHost"></section>
      </main>

      <aside class="inspector">
        <div class="panel-head">
          <h2>Loop Metrics</h2>
          <span class="panel-badge active">M2</span>
        </div>
        <div class="metric-grid">
          <div class="metric-card">
            <span>Mac 调度任务</span>
            <strong id="metricJobs">0</strong>
          </div>
          <div class="metric-card">
            <span>在线 worker</span>
            <strong id="metricWorkers">0</strong>
          </div>
          <div class="metric-card">
            <span>待审批</span>
            <strong id="metricApprovals">0</strong>
          </div>
          <div class="metric-card">
            <span>Agent 自动处理</span>
            <strong id="metricAuto">0</strong>
          </div>
        </div>
        <div class="panel-head">
          <h2>Recent Events</h2>
        </div>
        <div id="eventList" class="event-list"></div>
      </aside>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
