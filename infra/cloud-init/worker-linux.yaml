#cloud-config
package_update: true
packages:
  - python3
  - python3-venv
  - python3-pip
  - git
  - curl
  - ca-certificates

runcmd:
  - |
    curl -fsSL "${INSTALL_URL}" | bash -s -- \
      --control-url "${CONTROL_URL}" \
      --bootstrap-token "${BOOTSTRAP_TOKEN}" \
      --machine-name "${MACHINE_NAME}" \
      --repo-url "${REPO_URL}"

